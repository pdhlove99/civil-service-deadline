<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>민원 회신 기한 자동 산정 시스템</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .title {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2rem;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #e2e8f0;
    }

    input,
    select {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
    }

    select option {
      color: black;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37,99,235,0.4);
    }

    .result-card {
      margin-top: 35px;
      padding: 28px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .result-title {
      font-size: 1.4rem;
      margin-bottom: 20px;
      font-weight: 700;
      color: #60a5fa;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .deadline {
      font-size: 1.4rem;
      color: #22c55e;
      font-weight: 700;
    }

    .notice {
      margin-top: 20px;
      color: #cbd5e1;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px;
      }

      .title {
        font-size: 1.5rem;
      }

      .result-item {
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      민원 회신 기한 자동 산정 시스템
    </div>

    <div class="subtitle">
      영업일 기준 자동 계산 · 토/일 제외
    </div>

    <div class="input-group">
      <label>접수일</label>
      <input type="date" id="startDate">
    </div>

    <div class="input-group">
      <label>민원 유형</label>

      <select id="complaintType">
        <option value="3">단순 문의 (3영업일)</option>
        <option value="5">일반 민원 (5영업일)</option>
        <option value="7">기술 검토 민원 (7영업일)</option>
        <option value="10">특별 민원 (10영업일)</option>
      </select>
    </div>

    <button onclick="calculateDeadline()">
      회신 기한 계산하기
    </button>

    <div class="result-card" id="resultCard">

      <div class="result-title">
        계산 결과
      </div>

      <div class="result-item">
        <span>접수일</span>
        <span id="resultStart"></span>
      </div>

      <div class="result-item">
        <span>민원 유형</span>
        <span id="resultType"></span>
      </div>

      <div class="result-item">
        <span>처리 기한</span>
        <span id="resultDays"></span>
      </div>

      <div class="result-item">
        <span>회신 기한</span>
        <span class="deadline" id="resultDeadline"></span>
      </div>

      <div class="notice">
        ※ 토요일 및 일요일은 영업일 계산에서 제외됩니다.<br>
        ※ 실제 운영 환경에서는 공휴일 제외 기능 추가 가능
      </div>

    </div>

  </div>

  <script>
    // 오늘 날짜 기본값 설정
    window.onload = () => {
      const today = new Date().toISOString().split("T")[0];
      document.getElementById("startDate").value = today;
    };

    // 영업일 계산 함수
    function addBusinessDays(startDate, days) {

      let currentDate = new Date(startDate);

      while (days > 0) {

        currentDate.setDate(currentDate.getDate() + 1);

        const day = currentDate.getDay();

        // 토요일(6), 일요일(0) 제외
        if (day !== 0 && day !== 6) {
          days--;
        }
      }

      return currentDate;
    }

    // 날짜 포맷 함수
    function formatDate(date) {

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    // 계산 함수
    function calculateDeadline() {

      const startDate = document.getElementById("startDate").value;
      const typeSelect = document.getElementById("complaintType");

      const businessDays = parseInt(typeSelect.value);

      const typeText =
        typeSelect.options[typeSelect.selectedIndex].text;

      if (!startDate) {
        alert("접수일을 선택해주세요.");
        return;
      }

      const deadline = addBusinessDays(startDate, businessDays);

      document.getElementById("resultStart").innerText =
        startDate;

      document.getElementById("resultType").innerText =
        typeText;

      document.getElementById("resultDays").innerText =
        `${businessDays} 영업일`;

      document.getElementById("resultDeadline").innerText =
        formatDate(deadline);

      document.getElementById("resultCard").style.display =
        "block";
    }
  </script>

</body>
</html>
